server:
  port: 8084

spring:
  application:
    name: BOOKING-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/parkease_booking
    username: root
    password: 8770B26@k

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost

  cloud:
    inetutils:
      preferred-networks:
        - 127.0.0.1